name: Incremental Image Test

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Which step to build'
        required: true
        default: '0'
        type: choice
        options:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'

env:
  IMAGE: ghcr.io/davekiss/exe-laravel

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | sudo tar -xzf - -C /usr/local/bin crane

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build step ${{ inputs.step }}
        run: |
          STEP="${{ inputs.step }}"
          TAG="step${STEP}"

          case "$STEP" in
            0)
              # Step 0: Pure copy of exeuntu — preserves OCI index exactly
              echo "--- Copying exeuntu as-is (no build) ---"
              crane copy ghcr.io/boldsoftware/exeuntu:latest $IMAGE:$TAG
              ;;
            1)
              # Step 1: Bare FROM via Docker build
              cat > Dockerfile.test <<'EOF'
          FROM ghcr.io/boldsoftware/exeuntu:latest
          EOF

              echo "--- Dockerfile.test ---"
              cat Dockerfile.test
              echo "--- Building $IMAGE:$TAG (OCI format) ---"
              docker buildx build -f Dockerfile.test \
                --platform linux/amd64 \
                --output type=image,name=$IMAGE:$TAG,push=true,oci-mediatypes=true \
                --provenance=false \
                --sbom=false \
                .
              ;;
            2)
              # Step 2: Use crane to mutate (add label) without Docker build
              echo "--- Copying exeuntu + adding label via crane ---"
              crane copy ghcr.io/boldsoftware/exeuntu:latest $IMAGE:$TAG
              # crane mutate preserves the manifest structure
              crane mutate $IMAGE:$TAG --label test=true --tag $IMAGE:$TAG
              ;;
            3)
              # Step 3: Use crane append to add a layer
              echo "--- Creating layer with touch /tmp/test ---"
              mkdir -p layer/tmp
              touch layer/tmp/test
              tar -cf layer.tar -C layer .
              crane append -f layer.tar -t $IMAGE:$TAG -b ghcr.io/boldsoftware/exeuntu:latest
              ;;
            4)
              # Step 4: Docker build with apt install
              cat > Dockerfile.test <<'EOF'
          FROM ghcr.io/boldsoftware/exeuntu:latest
          RUN apt-get update && apt-get install -y curl && rm -rf /var/lib/apt/lists/*
          EOF

              echo "--- Dockerfile.test ---"
              cat Dockerfile.test
              echo "--- Building $IMAGE:$TAG ---"
              docker buildx build -f Dockerfile.test \
                --platform linux/amd64 \
                --output type=image,name=$IMAGE:$TAG,push=true,oci-mediatypes=true \
                --provenance=false \
                --sbom=false \
                .
              ;;
          esac

          echo "--- Inspect manifest ---"
          docker manifest inspect $IMAGE:$TAG 2>&1 | head -30 || crane manifest $IMAGE:$TAG | head -30

          echo ""
          echo "Test with: ssh exe.dev new --name=test-${TAG} --image=$IMAGE:$TAG"
