name: Incremental Image Test

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Which step to build'
        required: true
        default: '0'
        type: choice
        options:
          - '0'
          - '1'
          - '5'
          - '6'
          - '7'
          - '8'

env:
  IMAGE: ghcr.io/davekiss/exe-laravel

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        run: |
          VERSION=v0.20.2
          curl -sL "https://github.com/google/go-containerregistry/releases/download/${VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | sudo tar -xzf - -C /usr/local/bin crane

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build step ${{ inputs.step }}
        run: |
          STEP="${{ inputs.step }}"
          TAG="step${STEP}"

          case "$STEP" in
            0)
              # Step 0: Pure crane copy of exeuntu (preserves OCI index)
              echo "--- Copying exeuntu as-is (no build) ---"
              crane copy ghcr.io/boldsoftware/exeuntu:latest $IMAGE:$TAG
              ;;
            1)
              # Step 1: Docker build FROM exeuntu (no changes)
              cat > Dockerfile.test <<'EOF'
          FROM ghcr.io/boldsoftware/exeuntu:latest
          EOF

              echo "--- Dockerfile.test ---"
              cat Dockerfile.test
              echo "--- Building $IMAGE:$TAG ---"
              docker buildx build -f Dockerfile.test \
                --platform linux/amd64 \
                --output type=image,name=$IMAGE:$TAG,push=true,oci-mediatypes=true \
                --provenance=false \
                --sbom=false \
                .
              ;;
            5)
              # Step 5: Plain ubuntu (NOT exeuntu) — test SSH injection
              cat > Dockerfile.test <<'EOF'
          FROM ubuntu:24.04
          RUN apt-get update && apt-get install -y openssh-server && rm -rf /var/lib/apt/lists/*
          EXPOSE 22
          CMD ["/usr/sbin/sshd", "-D"]
          EOF

              echo "--- Dockerfile.test ---"
              cat Dockerfile.test
              echo "--- Building $IMAGE:$TAG ---"
              docker buildx build -f Dockerfile.test \
                --platform linux/amd64 \
                --output type=image,name=$IMAGE:$TAG,push=true,oci-mediatypes=true \
                --provenance=false \
                --sbom=false \
                .
              ;;
            6)
              # Step 6: docker pull + tag + push (no buildx, standard Docker push)
              echo "--- Pull exeuntu, retag, push via standard Docker ---"
              docker pull --platform linux/amd64 ghcr.io/boldsoftware/exeuntu:latest
              docker tag ghcr.io/boldsoftware/exeuntu:latest $IMAGE:$TAG
              docker push $IMAGE:$TAG
              ;;
            7)
              # Step 7: FROM exeuntu but DISABLE openssh-server
              # Theory: exe.dev injects its own sshd for non-exeuntu images,
              # but exeuntu's OpenSSH on port 22 blocks it
              cat > Dockerfile.test <<'EOF'
          FROM ghcr.io/boldsoftware/exeuntu:latest
          RUN systemctl disable ssh.service ssh.socket 2>/dev/null; \
              systemctl mask ssh.service ssh.socket 2>/dev/null; \
              true
          EOF

              echo "--- Dockerfile.test ---"
              cat Dockerfile.test
              echo "--- Building $IMAGE:$TAG ---"
              docker buildx build -f Dockerfile.test \
                --platform linux/amd64 \
                --output type=image,name=$IMAGE:$TAG,push=true,oci-mediatypes=true \
                --provenance=false \
                --sbom=false \
                .
              ;;
            8)
              # Step 8: Minimal ubuntu with systemd (like exeuntu but clean)
              cat > Dockerfile.test <<'EOF'
          FROM ubuntu:24.04
          RUN apt-get update && \
              apt-get install -y systemd systemd-sysv && \
              rm -rf /var/lib/apt/lists/*
          RUN useradd -m -s /bin/bash -u 1000 exedev && \
              echo "exedev ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          LABEL exe.dev/login-user=exedev
          STOPSIGNAL SIGRTMIN+3
          CMD ["/sbin/init"]
          EOF

              echo "--- Dockerfile.test ---"
              cat Dockerfile.test
              echo "--- Building $IMAGE:$TAG ---"
              docker buildx build -f Dockerfile.test \
                --platform linux/amd64 \
                --output type=image,name=$IMAGE:$TAG,push=true,oci-mediatypes=true \
                --provenance=false \
                --sbom=false \
                .
              ;;
          esac

          echo "--- Inspect manifest ---"
          docker manifest inspect $IMAGE:$TAG 2>&1 | head -30 || crane manifest $IMAGE:$TAG | head -30

          echo ""
          echo "Test with: ssh exe.dev new --name=test-${TAG} --image=$IMAGE:$TAG"
