name: Test Minimal Image

on:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/davekiss/exe-laravel

jobs:
  build-noop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push noop image (OCI index with platform)
        run: |
          echo 'FROM ghcr.io/boldsoftware/exeuntu:latest
          LABEL org.opencontainers.image.source=https://github.com/davekiss/exe-laravel
          RUN echo noop' > Dockerfile.noop
          docker buildx build -f Dockerfile.noop \
            --platform linux/amd64 \
            --output type=image,name=$IMAGE:noop-oci2,push=true,oci-mediatypes=true \
            --provenance=false \
            --sbom=false \
            .

      - name: Verify manifest format
        run: |
          docker manifest inspect $IMAGE:noop-oci2 | head -20
